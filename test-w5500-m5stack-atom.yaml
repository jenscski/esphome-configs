substitutions:
  wifi_reboot_timeout: 5min
  api_timeout: 15min
  name: test-w5500-m5stack-atom
  friendly_name: 'W5500 @ Atom Lite Test #1'
  comment: W5500 @ Atom Lite
  board: m5stack-atom

esphome:
  name: test-w5500-m5stack-atom
  comment: W5500 @ Atom Lite
  friendly_name: 'W5500 @ Atom Lite Test #1'

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: y

sensor:
logger:

ethernet:
  id: eth0
  type: W5500
  clk_pin: GPIO22
  mosi_pin: GPIO33
  miso_pin: GPIO23
  cs_pin: GPIO19
  clock_speed: 20MHz
  polling_interval: 10ms