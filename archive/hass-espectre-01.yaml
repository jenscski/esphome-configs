substitutions:
  name: hass-espectre-01
  friendly_name: ESPectre 1
  comment: AtomS3 Lite ESP32S3 ESPectre
  board: m5stack-atoms3
  git_ref: main # branch, tag, or commit
  detection_algorithm: ml # mvs (default) or ml
  
packages:
  common: !include packages/common-32-api.yaml

esp32:
  flash_size: 8MB
  variant: ESP32S3
  framework:
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: y

esphome:
  on_boot:
    priority: 600
    then:
      - binary_sensor.template.publish:
          id: occupancy
          state: False

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO35
    num_leds: 1
    chipset: SK6812
    id: status_led
    name: Light
    restore_mode: ALWAYS_OFF

# Load ESPectre component from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/francescopace/espectre
      ref: ${git_ref}
    components: [ espectre ]
    refresh: always

# ESPectre - WiFi CSI Motion Detection
espectre:
  id: espectre_csi
  detection_algorithm: ${detection_algorithm}
#  segmentation_threshold: 1
  motion_sensor:
    id: motion_detected
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              - script.execute: my_script

binary_sensor:
  - platform: template
    device_class: occupancy
    id: occupancy
    name: Occupancy

script:
  - id: my_script
    mode: restart
    then: 
      - binary_sensor.template.publish:
          id: occupancy
          state: True
      - delay: 60s
      - binary_sensor.template.publish:
          id: occupancy
          state: False