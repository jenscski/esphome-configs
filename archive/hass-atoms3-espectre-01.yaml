substitutions:
  name: hass-atoms3-espectre-01
  friendly_name: AtomS3 Lite ESP32S3 Dev Kit Testing
  comment: AtomS3 Lite ESP32S3 Dev Kit
  board: m5stack-atoms3
  git_ref: main # branch, tag, or commit
  detection_algorithm: mvs # mvs (default) or ml
  
packages:
  common: !include packages/common-32-api.yaml

esp32:
  flash_size: 8MB
  variant: ESP32S3
  framework:
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: y

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO41
      inverted: true
    name: Button

output:
  - platform: ledc
    pin: GPIO16
    id: backlight_pwm

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO35
    num_leds: 1
    chipset: SK6812
    id: status_led
    name: Light

# Load ESPectre component from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/francescopace/espectre
      ref: ${git_ref}
    components: [ espectre ]
    refresh: always

# ESPectre - WiFi CSI Motion Detection
espectre:
  id: espectre_csi
  detection_algorithm: ${detection_algorithm}    